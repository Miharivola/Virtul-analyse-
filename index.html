<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Predictor Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1424;
            --card: #162136;
            --gold: #ffc107;
            --input: #1e293b;
            --border: #2d3748;
            --text-w: #ffffff;
            --text-g: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text-w);
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 10px;
            padding-bottom: 90px;
        }

        /* Utility */
        .clickable { cursor: pointer; transition: 0.2s; }
        .clickable:active { transform: scale(0.95); opacity: 0.8; }

        /* Top Menu */
        .top-nav {
            display: flex; gap: 8px; overflow-x: auto;
            padding: 10px 0; scrollbar-width: none;
        }
        .btn-top {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text-g); padding: 8px 14px; border-radius: 8px;
            white-space: nowrap; font-size: 13px; font-weight: 500;
        }
        .btn-top.active { background: var(--gold); color: #000; border: none; }

        /* Historique Section */
        .historique-card {
            background: var(--card); border-radius: 12px;
            padding: 15px; margin-top: 10px; border: 1px solid #202b3e;
        }
        .text-area-box {
            background: var(--input); border-radius: 8px;
            padding: 15px; color: var(--text-g); font-family: monospace;
            min-height: 100px; margin-top: 10px; border: 1px solid var(--border);
        }
        .save-btn {
            background: #25334a; color: var(--text-w); width: 100%;
            padding: 12px; border-radius: 8px; border: none;
            margin-top: 10px; font-weight: bold; display: flex;
            align-items: center; justify-content: center; gap: 10px;
        }

        /* League Grid */
        .league-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin: 15px 0;
        }
        .btn-league {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text-w); padding: 10px; border-radius: 8px;
            text-align: center; font-size: 13px;
        }
        .btn-league.active { background: var(--gold); color: #000; border: none; font-weight: bold; }

        /* Main Form */
        .form-card {
            background: var(--card); padding: 15px; border-radius: 12px;
        }
        .row { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 10px; margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: var(--text-g); margin-bottom: 5px; text-transform: uppercase; }
        input {
            width: 100%; background: var(--input); border: 1.5px solid var(--border);
            padding: 12px; border-radius: 8px; color: white; box-sizing: border-box;
        }
        input:focus { border-color: var(--gold); outline: none; }

        /* Bottom Nav */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg); display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid var(--border);
        }
        .nav-link { text-align: center; color: var(--text-g); text-decoration: none; font-size: 10px; }
        .nav-link.active { color: var(--gold); }
        .nav-link i { display: block; font-size: 20px; margin-bottom: 3px; }

    </style>
</head>
<body>

    <div class="top-nav">
        <div class="btn-top clickable"><i class="fas fa-fire"></i> TIPS</div>
        <div class="btn-top clickable"><i class="fas fa-check"></i> MULTIPLE</div>
        <div class="btn-top active clickable"><i class="fas fa-play-circle"></i> BEST LIVE</div>
        <div class="btn-top clickable"><i class="fas fa-chart-bar"></i> ANALYSIS</div>
    </div>

    <div class="historique-card">
        <h4 style="margin: 0; font-size: 16px;"><span style="color: #2dd4bf;">1</span> Historique (Texte)</h4>
        <div class="text-area-box">
            Exemple:<br>
            Team A 2-1 Team B<br>
            Team C 0-0 Team D
        </div>
        <button class="save-btn clickable">
            <i class="fas fa-save"></i> Sauvegarder historique
        </button>
    </div>

    <h4 style="text-align: center; margin-top: 25px;">② Nouvelle Analyse (Matchs)</h4>
    <p style="text-align: center; font-size: 11px; color: var(--text-g);">LIGUE</p>

    <div class="league-grid">
        <div class="btn-league clickable">English League</div>
        <div class="btn-league clickable">Champions League</div>
        <div class="btn-league active clickable">Africa Cup</div>
        <div class="btn-league clickable">Italian League</div>
        <div class="btn-league clickable">Spanish League</div>
        <div class="btn-league clickable">French League</div>
    </div>

    <div class="form-card">
        <div style="margin-bottom: 15px;">
            <label style="text-align: center;">Heure du Match</label>
            <input type="time" value="19:45">
        </div>

        <div class="row">
            <div>
                <label>Équipe Domicile (1)</label>
                <input type="text" value="DR Congo">
            </div>
            <div>
                <label>Cote Domicile (1)</label>
                <input type="text" value="2.15" style="border-color: var(--gold);">
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end; margin-bottom: 12px;">
            <div style="width: 40%;">
                <label>Cote Nul (X)</label>
                <input type="text" value="3.40">
            </div>
        </div>

        <div class="row">
            <div>
                <label>Équipe Extérieur (2)</label>
                <input type="text" value="Ivory Coast">
            </div>
            <div>
                <label>Cote Extérieur (2)</label>
                <input type="text" value="4.20">
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="nav-link active clickable"><i class="fas fa-fire"></i>VIRTUEL</div>
        <div class="nav-link clickable"><i class="fas fa-plane"></i>AVIATOR</div>
        <div class="nav-link clickable"><i class="fas fa-gem"></i>VIP</div>
        <div class="nav-link clickable"><i class="fas fa-bars"></i>MENU</div>
    </div>

    <script>
        // Manampy dynamique kely: rehefa kitiana ny bokotra dia miova "active"
        const leagueBtns = document.querySelectorAll('.btn-league, .btn-top, .nav-link');
        
        leagueBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                // Esory izay efa active ao amin'ny group-ny
                const siblings = this.parentElement.querySelectorAll('.active');
                siblings.forEach(s => s.classList.remove('active'));
                
                // Ampio "active" ilay vao nokitiana
                this.classList.add('active');
            });
        });
    </script>

</body>
</html>
