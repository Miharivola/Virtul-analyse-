<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Predictor AI - Image Analysis</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b1120;
            --card: #162136;
            --gold: #ffc107;
            --input: #1e293b;
            --text-g: #94a3b8;
            --accent-green: #2dd4bf;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: sans-serif;
            margin: 0; padding: 15px;
            padding-bottom: 100px;
        }

        /* Box hanehoana ny sary nampidirina */
        .upload-zone {
            border: 2px dashed #2d3748;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            background: var(--card);
            margin-bottom: 20px;
            cursor: pointer;
        }

        .upload-zone i { font-size: 30px; color: var(--gold); margin-bottom: 10px; }

        /* Graphique kely boribory */
        .stats-circle {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 5px solid var(--border);
            display: flex; align-items: center;
            justify-content: center;
            margin: 0 auto;
            font-weight: bold;
            border-top-color: var(--accent-green); /* Hoatran'ny loading */
        }

        .result-panel {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid var(--gold);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            display: none; /* Hipetraka rehefa vita ny analyse */
        }

        .btn-action {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h3 style="text-align: center;">AI HISTORY ANALYZER</h3>

    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <i class="fas fa-camera"></i><br>
        <span>AMPIDIRO NY CAPTURE (HISTORIQUE)</span>
        <input type="file" id="file-input" style="display:none" accept="image/*" onchange="previewImage(event)">
    </div>

    <div id="preview-container" style="display:none; text-align:center; margin-bottom: 20px;">
        <img id="img-preview" style="max-width: 100%; border-radius: 8px; border: 2px solid var(--gold);">
        <p style="font-size: 12px; color: var(--text-g);">Sary vonona hovakiana...</p>
    </div>

    <button class="btn-action" style="background: var(--gold); color: #000;" onclick="lancerAnalyse()">
        <i class="fas fa-bolt"></i> Lancer l'Analyse AI
    </button>

    <div id="result-panel" class="result-panel">
        <h4 style="text-align:center; margin-top:0; color:var(--gold)">VOKATRY NY ANALYSE</h4>
        
        <div style="display: flex; justify-content: space-around; align-items: center;">
            <div style="text-align:center">
                <div class="stats-circle" style="border-top-color: var(--accent-green);">82%</div>
                <p style="font-size: 11px; margin-top: 5px;">PROBABILITÉ WIN</p>
            </div>
            <div style="text-align:center">
                <div class="stats-circle" style="border-top-color: #fb7185;">18%</div>
                <p style="font-size: 11px; margin-top: 5px;">RISQUE PERTE</p>
            </div>
        </div>

        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-top: 15px;">
            <p style="margin:0; font-size: 12px; color: var(--text-g);">CONSEIL STRATÉGIQUE:</p>
            <p style="margin: 5px 0 0 0; font-weight: bold; font-size: 18px; color: var(--accent-green);">👉 VICTOIRE DOMICILE (1)</p>
            <p style="margin-top: 5px; font-size: 11px;">Mifototra amin'ny lalao 10 farany hita tao amin'ny sary.</p>
        </div>
    </div>

    <script>
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('img-preview');
                output.src = reader.result;
                document.getElementById('preview-container').style.display = 'block';
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function lancerAnalyse() {
            // Ampiana "Loading" kely aloha
            const btn = document.querySelector('.btn-action');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> AI mivaky sary...';
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                document.getElementById('result-panel').style.display = 'block';
                // Scroll mankany amin'ny valiny
                window.scrollTo(0, document.body.scrollHeight);
            }, 2500); // 2.5 segondra ny analyse
        }
    </script>
</body>
</html>
