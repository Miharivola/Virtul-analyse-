<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Predictor Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-bg: #0d1424;
            --card-bg: #162136;
            --accent-gold: #ffc107;
            --input-bg: #1e293b;
            --border-color: #2d3748;
            --text-white: #ffffff;
            --text-gray: #94a3b8;
        }

        body {
            background-color: var(--main-bg);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            padding-bottom: 80px; /* Spacement ho an'ny bottom nav */
        }

        /* Header Header */
        header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-text { font-weight: bold; font-size: 1.2rem; }
        .flag-mg { width: 25px; border-radius: 50%; }

        /* Menu Horizontale (TIPS, MULTIPLE, sns) */
        .top-menu {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px;
            scrollbar-width: none;
        }
        .top-menu::-webkit-scrollbar { display: none; }
        
        .menu-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-gray);
            padding: 8px 15px;
            border-radius: 8px;
            white-space: nowrap;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .menu-btn.active {
            background: var(--accent-gold);
            color: #000;
            font-weight: bold;
        }

        /* Section Ligue */
        .section-title {
            text-align: center;
            font-size: 1.1rem;
            margin: 20px 0 5px;
        }
        .section-subtitle {
            text-align: center;
            font-size: 11px;
            color: var(--text-gray);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .league-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 0 15px;
        }

        /* Form Card */
        .analysis-card {
            margin: 20px 15px;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #1e293b;
        }

        .form-group { margin-bottom: 15px; }
        .form-row {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 11px;
            color: var(--text-gray);
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            background: var(--input-bg);
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent-gold); }

        .cote-input { border-color: var(--border-color); }
        .active-input { border-color: var(--accent-gold); }

        /* Nul Cote (X) - Alignment */
        .nul-row {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .nul-row .input-container { width: 40%; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--main-bg);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid var(--border-color);
        }

        .nav-item {
            text-align: center;
            color: var(--text-gray);
            font-size: 10px;
            text-decoration: none;
        }
        .nav-item.active { color: var(--accent-gold); }
        .nav-item i { font-size: 18px; margin-bottom: 4px; display: block; }

    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars" style="color: var(--accent-gold); font-size: 24px;"></i>
            <span class="logo-text">vital</span>
        </div>
        <img src="https://flagcdn.com/w40/mg.png" class="flag-mg" alt="Madagascar">
    </header>

    <div class="top-menu">
        <div class="menu-btn"><i class="fas fa-fire"></i> TIPS</div>
        <div class="menu-btn"><i class="fas fa-check-circle"></i> MULTIPLE</div>
        <div class="menu-btn active"><i class="fas fa-play-circle"></i> BEST LIVE</div>
        <div class="menu-btn"><i class="fas fa-search"></i> ANALYSIS</div>
    </div>

    <h3 class="section-title">② Nouvelle Analyse (Matchs)</h3>
    <p class="section-subtitle">LIGUE</p>

    <div class="league-grid">
        <div class="menu-btn">English League</div>
        <div class="menu-btn">Champions League</div>
        <div class="menu-btn active">Africa Cup</div>
        <div class="menu-btn">Italian League</div>
        <div class="menu-btn">Spanish League</div>
        <div class="menu-btn">French League</div>
    </div>

    <div class="analysis-card">
        <div class="form-group">
            <label style="text-align: center;">Heure du Match</label>
            <div style="position: relative;">
                <input type="text" placeholder="Selectionner l'heure">
                <i class="far fa-clock" style="position: absolute; right: 15px; top: 15px; color: var(--text-gray);"></i>
            </div>
        </div>

        <div class="form-row">
            <div>
                <label>Équipe Domicile (1)</label>
                <input type="text" value="DR Congo">
            </div>
            <div>
                <label>Cote Domicile (1)</label>
                <input type="text" class="active-input" placeholder="Ex: 2.15" style="border-color: var(--accent-gold);">
            </div>
        </div>

        <div class="nul-row">
            <div class="input-container">
                <label>Cote Nul (X)</label>
                <input type="text" placeholder="Ex: 3.40">
            </div>
        </div>

        <div class="form-row" style="margin-top: 15px;">
            <div>
                <label>Équipe Extérieur (2)</label>
                <input type="text" value="Ivory Coast">
            </div>
            <div>
                <label>Cote Extérieur (2)</label>
                <input type="text" placeholder="Ex: 4.20">
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fas fa-fire"></i>VIRTUEL</a>
        <a href="#" class="nav-item"><i class="fas fa-plane"></i>AVIATOR</a>
        <a href="#" class="nav-item"><i class="fas fa-gem"></i>VIP</a>
        <a href="#" class="nav-item"><i class="fas fa-bars"></i>MENU</a>
    </nav>

</body>
</html>
