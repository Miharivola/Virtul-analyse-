<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betting Tips - Dynamic AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background-color: #1a1f2c; color: white; font-family: sans-serif; }
        .card-bg { background-color: #252b39; }
        .bg-yellow-gold { background-color: #facc15; }
        .border-dashed-custom { border: 2px dashed #3f4859; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-20">

    <div class="flex justify-between items-center mb-6">
        <div class="bg-yellow-gold p-2 rounded-lg text-black"><i class="fas fa-bars"></i></div>
        <div class="flex items-center gap-3">
            <div class="bg-[#2d3548] px-3 py-1 rounded-full border border-gray-700 text-xs text-yellow-400">🟡 4960</div>
            <i class="fas fa-shopping-cart text-yellow-500 text-xl"></i>
        </div>
    </div>

    <div class="card-bg rounded-2xl p-4 shadow-lg border border-gray-800">
        <div class="flex items-center gap-3 mb-4">
            <span class="bg-yellow-gold text-black w-6 h-6 rounded-full flex items-center justify-center font-bold text-sm">2</span>
            <h2 class="font-semibold text-sm">Nouvelle Analyse (Upload Matchs)</h2>
        </div>

        <div onclick="document.getElementById('analInput').click()" class="border-dashed-custom rounded-xl p-8 text-center mb-4 cursor-pointer hover:bg-[#2d3548]">
            <i class="far fa-image text-3xl text-gray-500 mb-3"></i>
            <p class="text-xs text-gray-400 font-bold">Uploadez le screenshot des matchs</p>
            <input type="file" id="analInput" class="hidden" accept="image/*" onchange="previewMatch(this)">
        </div>

        <div id="previewArea" class="mb-4"></div>

        <div id="leagueDisplay" class="w-full bg-[#1a1f2c] border border-gray-700 rounded-xl py-3 px-4 text-sm mb-3 flex justify-between">
            <span id="lgName">English League</span> <i class="fas fa-chevron-down text-gray-500"></i>
        </div>
        
        <input type="time" id="matchTime" value="11:00" class="w-full bg-[#1a1f2c] border border-gray-700 rounded-xl py-3 px-4 text-sm text-white mb-6 outline-none">

        <button id="btnAnal" onclick="processDynamicAnalyse()" class="w-full bg-yellow-gold py-4 rounded-xl text-black font-black text-sm shadow-xl flex items-center justify-center gap-2">
            <i class="fas fa-search"></i> LANCER L'ANALYSE
        </button>
    </div>

    <div id="resultsBox" class="hidden mt-8 space-y-6 animate-fade-in">
        
        <div class="card-bg rounded-2xl p-4 border-t-4 border-emerald-500 shadow-xl">
            <div class="flex justify-between items-center mb-4 text-[10px]">
                <span id="resLigue" class="text-gray-400 font-bold uppercase"></span>
                <span class="bg-red-600 px-2 py-0.5 rounded font-black">HOT MATCH</span>
            </div>
            <div class="flex justify-around items-center font-bold mb-6 text-sm">
                <span id="teamA" class="w-1/3 text-center">TEAM A</span>
                <span class="text-gray-600 text-[10px]">VS</span>
                <span id="teamB" class="w-1/3 text-center">TEAM B</span>
            </div>
            <div class="grid grid-cols-2 gap-4 text-[11px] border-t border-gray-800 pt-4">
                <div class="flex justify-between"><span>1X2:</span> <span class="text-emerald-400 font-bold">1</span></div>
                <div class="flex justify-between"><span>Score Exact:</span> <span class="text-yellow-500 font-bold">2-1</span></div>
                <div class="flex justify-between"><span>BTTS:</span> <span class="text-emerald-400">Yes</span></div>
                <div class="flex justify-between"><span>Lera:</span> <span id="resTime" class="font-bold"></span></div>
            </div>
        </div>

        <div class="bg-[#0f2d26] rounded-2xl p-4 border border-emerald-900/50">
            <h3 class="text-emerald-400 font-bold text-[10px] mb-3 uppercase tracking-widest"><i class="fas fa-shield-alt mr-2"></i>Multiple VIP</h3>
            <div class="bg-[#1a3a32] p-3 rounded-lg border-l-4 border-emerald-500 text-[11px]">
                <p id="multiMatch" class="opacity-80">-- vs -- <span class="float-right text-emerald-400 font-bold">1 (1.45)</span></p>
            </div>
        </div>
    </div>

    <script>
        function previewMatch(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('previewArea').innerHTML = `
                        <div class="relative rounded-xl overflow-hidden border border-yellow-500/50">
                            <img src="${e.target.result}" class="w-full h-24 object-cover opacity-40">
                            <div class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-yellow-500">SARY VONONA</div>
                        </div>`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function processDynamicAnalyse() {
            const fileInput = document.getElementById('analInput');
            const btn = document.getElementById('btnAnal');
            
            if(!fileInput.files[0]) return alert("Ampidiro aloha ny sary!");

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> READING DATA...`;

            try {
                // Famakiana ny soratra ao anatin'ilay sary nampidirinao
                const result = await Tesseract.recognize(fileInput.files[0], 'eng');
                const text = result.data.text;
                
                // Mampiasa regex kely isika hisitrahana ny anaran'ny ekipa (ity dia ohatra tsotra)
                // Amin'ny sary nalefanao: "West Ham", "Leeds", "Newcastle", sns.
                const teams = text.match(/[A-Z][a-z]+/g) || ["Team A", "Team B"];
                const tA = teams[0] || "Home";
                const tB = teams[1] || "Away";

                setTimeout(() => {
                    // Fanovana ny valiny miankina amin'ny sary sy ny form
                    document.getElementById('teamA').innerText = tA.toUpperCase();
                    document.getElementById('teamB').innerText = tB.toUpperCase();
                    document.getElementById('resLigue').innerText = document.getElementById('lgName').innerText;
                    document.getElementById('resTime').innerText = document.getElementById('matchTime').value;
                    document.getElementById('multiMatch').innerHTML = `${tA} vs ${tB} <span class="float-right text-emerald-400 font-bold">1 (1.80)</span>`;

                    // Mampiseho ny valiny
                    document.getElementById('resultsBox').classList.remove('hidden');
                    document.getElementById('resultsBox').scrollIntoView({ behavior: 'smooth' });

                    btn.innerHTML = `<i class="fas fa-check"></i> ANALYSE TERMINÉE`;
                    btn.classList.replace('bg-yellow-gold', 'bg-emerald-500');
                    btn.disabled = false;
                }, 2500);

            } catch (e) {
                alert("Error: " + e.message);
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
