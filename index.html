<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betting Tips - Historique Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { background-color: #1a1f2c; color: white; font-family: sans-serif; }
        .card-bg { background-color: #252b39; }
        .bg-yellow-gold { background-color: #facc15; }
        .border-dashed-custom { border: 2px dashed #3f4859; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-10">

    <div class="flex justify-between items-center mb-6">
        <div class="bg-yellow-gold p-2 rounded-lg text-black"><i class="fas fa-bars"></i></div>
        <div class="flex items-center gap-3">
            <div class="bg-[#2d3548] px-3 py-1 rounded-full flex items-center gap-2 border border-gray-700">
                <span class="text-yellow-400 text-xs">🟡 4960</span>
            </div>
            <i class="fas fa-shopping-cart text-yellow-500 text-xl font-bold"></i>
        </div>
    </div>

    <div class="space-y-6">
        
        <div class="card-bg rounded-2xl p-4 shadow-lg border border-gray-800">
            <div class="flex items-center gap-3 mb-4">
                <span class="bg-emerald-500 text-black w-6 h-6 rounded-full flex items-center justify-center font-bold text-sm">1</span>
                <h2 class="font-semibold text-sm">Historique (Upload)</h2>
            </div>
            
            <div onclick="document.getElementById('histInput').click()" 
                 class="border-dashed-custom rounded-xl p-6 text-center mb-4 cursor-pointer hover:bg-[#2d3548] transition-all">
                <i class="fas fa-cloud-upload-alt text-3xl text-gray-500 mb-2"></i>
                <p class="text-xs text-gray-400 font-bold"><span class="text-emerald-400">Cliquez</span> ou glissez vos images</p>
                <p class="text-[9px] text-gray-500 mt-1 uppercase">PNG, JPG (MAX 5 IMAGES)</p>
                <input type="file" id="histInput" class="hidden" accept="image/*" multiple onchange="handleHistFiles(this)">
            </div>

            <div id="histPreview" class="flex flex-wrap gap-2 mb-4"></div>

            <button onclick="saveHistory()" class="w-full bg-[#363f54] py-3 rounded-xl text-xs font-bold text-gray-300 hover:bg-[#434d66] active:scale-95 transition-all">
                <i class="fas fa-save mr-2"></i> Sauvegarder historique
            </button>
        </div>

        <div class="card-bg rounded-2xl p-4 shadow-lg border border-gray-800">
            <div class="flex items-center gap-3 mb-4">
                <span class="bg-yellow-gold text-black w-6 h-6 rounded-full flex items-center justify-center font-bold text-sm">2</span>
                <h2 class="font-semibold text-sm">Nouvelle Analyse (Upload Matchs)</h2>
            </div>

            <div onclick="document.getElementById('analInput').click()" 
                 class="border-dashed-custom rounded-xl p-8 text-center mb-4 cursor-pointer hover:bg-[#2d3548]">
                <i class="far fa-image text-3xl text-gray-500 mb-3"></i>
                <p class="text-xs text-gray-400 font-bold"><span class="text-yellow-500">Uploadez</span> les matchs à analyser</p>
                <input type="file" id="analInput" class="hidden" accept="image/*" onchange="handleAnalFile(this)">
            </div>

            <div id="analPreview" class="mb-4"></div>

            <div onclick="openModal()" class="w-full bg-[#1a1f2c] border border-gray-700 rounded-xl py-3 px-4 text-sm mb-3 flex justify-between items-center cursor-pointer">
                <span id="leagueNameText">English League</span>
                <i class="fas fa-chevron-down text-gray-500 text-[10px]"></i>
            </div>

            <input type="time" id="matchTime" value="20:38" 
                class="w-full bg-[#1a1f2c] border border-gray-700 rounded-xl py-3 px-4 text-sm text-white mb-6 outline-none focus:border-yellow-500">

            <button id="mainAnalyzeBtn" onclick="startFullAnalysis()" class="w-full bg-yellow-gold py-4 rounded-xl text-black font-black text-sm shadow-xl flex items-center justify-center gap-2">
                <i class="fas fa-search"></i> LANCER L'ANALYSE (1 TOKEN)
            </button>
        </div>
    </div>

    <div id="leagueModal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-6">
        <div class="bg-[#252b39] w-full max-w-xs rounded-3xl overflow-hidden border border-gray-700">
            <div class="p-4 border-b border-gray-800 font-bold text-center">Ligue</div>
            <div class="max-h-60 overflow-y-auto" id="leagueOptions">
                <div class="p-4 border-b border-gray-800 hover:bg-[#2d3548] cursor-pointer" onclick="setLg('Champions League')">Champions League</div>
                <div class="p-4 border-b border-gray-800 hover:bg-[#2d3548] cursor-pointer" onclick="setLg('English League')">English League</div>
            </div>
            <button onclick="closeModal()" class="w-full bg-yellow-500 text-black py-3 font-bold">OK</button>
        </div>
    </div>

    <div id="resultsArea" class="hidden mt-8 animate-bounce-in">
        <div class="p-4 bg-emerald-900/20 border border-emerald-500 rounded-2xl text-center text-sm font-bold text-emerald-400">
            Analyse effectuée avec succès! (Jereo eto ambany)
        </div>
        </div>

    <script>
        // --- LOGIC HISTORIQUE ---
        function handleHistFiles(input) {
            const preview = document.getElementById('histPreview');
            // preview.innerHTML = ''; // Raha tiana hofafana ny teo aloha
            
            Array.from(input.files).forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.className = "relative w-20 h-20 rounded-lg overflow-hidden border-2 border-gray-700 shadow-lg";
                    div.innerHTML = `
                        <img src="${e.target.result}" class="w-full h-full object-cover">
                        <button onclick="this.parentElement.remove()" class="absolute top-0 right-0 bg-red-600 text-white text-[10px] px-1 rounded-bl-lg">
                            <i class="fas fa-times"></i>
                        </button>
                    `;
                    preview.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }

        function saveHistory() {
            const count = document.getElementById('histPreview').childElementCount;
            if(count === 0) return alert("Ampidiro aloha ny sary!");
            
            const btn = document.querySelector('button[onclick="saveHistory()"]');
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Sauvegarde...`;
            
            setTimeout(() => {
                btn.innerHTML = `<i class="fas fa-check mr-2"></i> Historique Sauvegardé`;
                btn.classList.replace('bg-[#363f54]', 'bg-emerald-600');
                setTimeout(() => {
                    btn.innerHTML = `<i class="fas fa-save mr-2"></i> Sauvegarder historique`;
                    btn.classList.replace('bg-emerald-600', 'bg-[#363f54]');
                }, 2000);
            }, 1500);
        }

        // --- LOGIC ANALYSE ---
        function handleAnalFile(input) {
            const preview = document.getElementById('analPreview');
            const file = input.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.innerHTML = `
                        <div class="w-full h-32 rounded-xl border border-yellow-500/50 overflow-hidden relative">
                            <img src="${e.target.result}" class="w-full h-full object-cover opacity-50">
                            <div class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-yellow-500 uppercase">Sary hovakiana vonona</div>
                        </div>
                    `;
                };
                reader.readAsDataURL(file);
            }
        }

        async function startFullAnalysis() {
            const btn = document.getElementById('mainAnalyzeBtn');
            const file = document.getElementById('analInput').files[0];
            
            if(!file) return alert("Uploadez d'abord le match à analyser!");

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> CALCUL EN COURS...`;

            // OCR Simulation & UI show
            setTimeout(() => {
                document.getElementById('resultsArea').classList.remove('hidden');
                btn.innerHTML = `<i class="fas fa-check"></i> ANALYSE TERMINÉE`;
                btn.classList.replace('bg-yellow-gold', 'bg-emerald-500');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 3000);
        }

        // --- MODAL UTILS ---
        function openModal() { document.getElementById('leagueModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('leagueModal').classList.add('hidden'); }
        function setLg(name) { 
            document.getElementById('leagueNameText').innerText = name; 
            closeModal();
        }
    </script>
</body>
</html>
